FILE : index.html (HOME PAGE)
========================= -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Annapurna Vegetable Shop</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f4fff4;
}

header{
    background:linear-gradient(to right,#1b5e20,#43a047);
    padding:20px;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:white;
    font-size:30px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 12px;
    font-size:18px;
}

nav a:hover{
    color:yellow;
}

.hero{
    height:500px;
    background:url('https://images.unsplash.com/photo-1542838132-92c53300491e') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero-text{
    background:rgba(0,0,0,0.5);
    padding:30px;
    border-radius:15px;
    color:white;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin-top:15px;
    font-size:22px;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:orange;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

.section-title{
    text-align:center;
    margin:40px 0;
    color:#2e7d32;
    font-size:40px;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}

.product{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    text-align:center;
    padding-bottom:20px;
}

.product img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.price{
    color:#e65100;
    font-size:22px;
    margin-top:10px;
    font-weight:bold;
}

footer{
    background:#1b5e20;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:30px;
}

</style>
</head>

<body>

<header>
<div class="navbar">
<div class="logo">Annapurna Shop</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>
</div>
</header>

<section class="hero">
<div class="hero-text">
<h1>Fresh Vegetables & Fruits</h1>
<p>Healthy Food For Healthy Life</p>

<a href="about.html" class="btn">Explore More</a>
</div>
</section>

<h2 class="section-title">Popular Products</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1567306226416-28f0efdc88ce">
<h2>Apple</h2>
<div class="price">₹120 / Kg</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1582515073490-dc6c8b1db7b2">
<h2>Tomato</h2>
<div class="price">₹40 / Kg</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655">
<h2>Carrot</h2>
<div class="price">₹60 / Kg</div>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2">
<h2>Banana</h2>
<div class="price">₹50 / Dozen</div>
</div>

</div>

<footer>
<p>© 2026 Annapurna Vegetable Shop</p>
</footer>

</body>
</html>
